name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── 1. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest

  # ── 2. Build Linux binary ─────────────────────────────────────────────────────
  build-linux:
    name: Build Linux binaries
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + build
        run: |
          pip install -e . pyinstaller
          pyinstaller --onefile --name converter --distpath dist/ converter/__main__.py
          pyinstaller --onefile --name searcher  --distpath dist/ searcher/__main__.py
          tar -czf filetools-linux-x86_64.tar.gz -C dist converter searcher
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: filetools-linux-x86_64.tar.gz

  # ── 3. Build Windows binary ───────────────────────────────────────────────────
  build-windows:
    name: Build Windows binaries
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + build
        run: |
          pip install -e . pyinstaller
          pyinstaller --onefile --name converter --distpath dist\ converter\__main__.py
          pyinstaller --onefile --name searcher  --distpath dist\ searcher\__main__.py
      - name: Package
        shell: pwsh
        run: |
          Copy-Item install.bat dist\
          Compress-Archive -Path dist\converter.exe, dist\searcher.exe, dist\install.bat `
            -DestinationPath filetools-windows-x86_64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: filetools-windows-x86_64.zip

  # ── 4. Build macOS binary ─────────────────────────────────────────────────────
  build-macos:
    name: Build macOS binaries
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + build
        run: |
          pip install -e . pyinstaller
          pyinstaller --onefile --name converter --distpath dist/ converter/__main__.py
          pyinstaller --onefile --name searcher  --distpath dist/ searcher/__main__.py
          tar -czf filetools-macos-x86_64.tar.gz -C dist converter searcher
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: filetools-macos-x86_64.tar.gz

  # ── 5. Publish GitHub Release ─────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with: { name: linux }
      - uses: actions/download-artifact@v4
        with: { name: windows }
      - uses: actions/download-artifact@v4
        with: { name: macos }

      - name: Build source zip
        run: |
          zip -r filetools-source.zip . \
            --exclude "*/__pycache__/*" --exclude "*.pyc" \
            --exclude "*/.git/*"        --exclude "*/dist/*" \
            --exclude "*/.venv/*"       --exclude "*.egg-info/*" \
            --exclude "*/.pytest_cache/*"

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: "FileTools ${{ steps.tag.outputs.version }}"
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: |
            filetools-linux-x86_64.tar.gz
            filetools-windows-x86_64.zip
            filetools-macos-x86_64.tar.gz
            filetools-source.zip
